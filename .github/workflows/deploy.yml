name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    env:
      REPOSITORY_URL: https://github.com/${{ github.repository }}.git

    steps:
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy with Docker Compose
        run: |
          ssh -i ~/.ssh/deploy_key -p "${{ secrets.VPS_PORT }}" "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" << EOF
            set -e

            APP_DIR="\$HOME/cyberpunk-red-support"
            REPOSITORY_URL="${{ env.REPOSITORY_URL }}"

            mkdir -p "\$APP_DIR"

            if [ -d "\$APP_DIR/.git" ]; then
              cd "\$APP_DIR"
              git fetch origin main
              git reset --hard origin/main
            else
              rm -rf "\$APP_DIR"
              git clone --branch main "\$REPOSITORY_URL" "\$APP_DIR"
              cd "\$APP_DIR"
            fi

            git clean -fd

            if docker compose version >/dev/null 2>&1; then
              docker compose up -d --build
            else
              docker-compose up -d --build
            fi

            docker image prune -f
          EOF
